# Claude Analysis Configuration
claude:
  model: claude-3-5-sonnet-20241022
  max_tokens: 2000
  temperature: 0.7
  
# Analysis Prompts
prompts:
  individual_transaction: |
    Analyze this insider trading transaction for potential signals and insights.
    Evaluate significance, patterns, sentiment, and potential risks.
  
  batch_analysis: |
    Analyze these insider trading transactions for cross-company patterns and sector trends.
    Identify key signals and potential opportunities or risks.
  
  pattern_detection: |
    Look for patterns in these insider trades. Identify unusual activity, coordinated trading,
    and what these patterns might indicate about executive confidence or concerns.

# SEC EDGAR Configuration
sec:
  base_url: https://data.sec.gov
  timeout: 30
  retry_attempts: 3

# Processing Configuration
processing:
  days_back: 30
  batch_size: 5
  output_format: json
  output_dir: ./results
